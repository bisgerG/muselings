<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR 任務｜哺乳動物區</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="ar-body">

  <!-- ===== HTML UI 疊層（對話框、任務提示、答題） ===== -->
  <div id="ui">
    <div id="topbar">
      <a class="ui-btn" href="index.html">← 離開</a>
      <div id="hearts" class="hearts hidden"></div>
      <a class="ui-btn" href="dex.html">📖</a>
    </div>

    <div id="hint" class="hint">請將鏡頭對準「時空裂縫」圖騰……</div>

    <div id="dialog" class="dialog hidden">
      <div id="dialog-name" class="dialog-name"></div>
      <p id="dialog-text" class="dialog-text"></p>
      <div id="dialog-next" class="dialog-next">▼ 點一下繼續</div>
    </div>

    <div id="quiz" class="quiz hidden">
      <p id="quiz-question" class="quiz-question"></p>
      <div id="quiz-options" class="quiz-options"></div>
    </div>

    <div id="captured-panel" class="captured-panel hidden">
      <p class="captured-title">✨ 收服成功！</p>
      <p id="captured-text"></p>
      <a class="btn btn-primary" href="dex.html">查看我的圖鑑</a>
    </div>

    <div id="flash" class="flash"></div>
  </div>

  <!-- ===== AR 場景 =====
       demo.mind 為 MindAR 官方範例的預編譯追蹤檔；
       正式版換成自製圖騰編譯後的 assets/targets/dino.mind -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets/demo.mind;"
    color-space="sRGB"
    renderer="colorManagement: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.7/"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"
              cursor="fuse: false; rayOrigin: mouse;"
              raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

    <a-entity id="anchor" mindar-image-target="targetIndex: 0">
      <!-- 精靈「小茜」：Draco 壓縮的赤狐模型（834KB），idle 動畫由 animation-mixer 播放 -->
      <a-entity id="spirit" scale="0 0 0" position="0 0 0"
                animation__pet="property: scale; from: 1 1 1; to: 1.12 1.12 1.12; dir: alternate; loop: 2; dur: 120; easing: easeOutQuad; startEvents: petted"
                animation__capture="property: scale; to: 0.01 0.01 0.01; dur: 900; easing: easeInBack; startEvents: capture">
        <a-gltf-model id="spirit-model" class="clickable"
                      src="assets/models/red_fox.glb"
                      scale="0.6 0.6 0.6" position="0 0 0" rotation="0 65 0"
                      animation-mixer="clip: *smell*; crossFadeDuration: 0.25"></a-gltf-model>
      </a-entity>
    </a-entity>
  </a-scene>

  <script src="js/save.js"></script>
  <script src="js/ar-game.js"></script>
</body>
</html>
