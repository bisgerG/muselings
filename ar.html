<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR 任務｜哺乳動物區</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
  <!-- ?v= 版本參數：每次改版遞增，避免 GitHub Pages 快取讓新 HTML 配到舊 JS/CSS -->
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body class="ar-body">

  <!-- ===== HTML UI 疊層（對話框、任務提示、答題） ===== -->
  <div id="ui">
    <!-- 載入層：時光羅盤校準（取代 MindAR 預設載入 UI） -->
    <div id="loading-layer" class="loading-layer">
      <div class="compass">
        <div class="compass-ring compass-outer"></div>
        <div class="compass-ring compass-mid"></div>
        <div class="compass-ring compass-inner"></div>
        <div class="compass-core"></div>
      </div>
      <p class="loading-text">時光羅盤校準中……</p>
      <button id="retry-btn" class="btn btn-primary retry-btn hidden" onclick="location.reload()">重新載入</button>
    </div>

    <!-- 掃描層：尋標環（取代 MindAR 預設白色掃描框） -->
    <div id="scan-layer" class="scan-layer off">
      <div class="vignette"></div>
      <div class="seeker">
        <div class="seeker-ring"></div>
        <span class="corner c-tl"></span><span class="corner c-tr"></span>
        <span class="corner c-bl"></span><span class="corner c-br"></span>
        <p class="seeker-text">搜尋時空裂縫</p>
      </div>
    </div>

    <div id="topbar">
      <a class="ui-btn" href="index.html">← 離開</a>
      <div id="hearts" class="hearts hidden"></div>
      <a class="ui-btn" href="dex.html">📖</a>
    </div>

    <div id="hint" class="hint">請將鏡頭對準「時空裂縫」圖騰……</div>

    <div id="dialog" class="dialog hidden">
      <div id="dialog-name" class="dialog-name"></div>
      <p id="dialog-text" class="dialog-text"></p>
      <div id="dialog-next" class="dialog-next">▼ 點一下繼續</div>
    </div>

    <div id="quiz" class="quiz hidden">
      <p id="quiz-question" class="quiz-question"></p>
      <div id="quiz-options" class="quiz-options"></div>
    </div>

    <div id="captured-panel" class="captured-panel hidden">
      <p class="captured-title">✨ 收服成功！</p>
      <p id="captured-text"></p>
      <a class="btn btn-primary" href="dex.html">查看我的圖鑑</a>
    </div>

    <div id="flash" class="flash"></div>
  </div>

  <!-- ===== AR 場景 =====
       demo.mind 為 MindAR 官方範例的預編譯追蹤檔；
       正式版換成自製圖騰編譯後的 assets/targets/dino.mind -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets/demo.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no; uiLoading: no;"
    color-space="sRGB"
    renderer="colorManagement: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.7/"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- far 必須涵蓋 MindAR 像素尺度的釘選距離（d=3×錨點縮放，實機可達數千）——
         設 1000 會讓點擊射線搆不到精靈的命中球 -->
    <a-camera position="0 0 0" look-controls="enabled: false"
              cursor="fuse: false; rayOrigin: mouse;"
              raycaster="near: 0.01; far: 100000; objects: .clickable"></a-camera>

    <a-entity id="anchor" mindar-image-target="targetIndex: 0">
      <!-- 精靈「小茜」：Draco 壓縮的赤狐模型（834KB），idle 動畫由 animation-mixer 播放。
           Marker 只是觸發器：掃描到的瞬間 ar-game.js 會把 #spirit 改掛到相機下
           釘在畫面中央（正面、無俯仰角），之後不再受 marker 追蹤影響。
           scale 與撫摸/收服動畫由 pinToCamera() 依 MindAR 單位動態設定 -->
      <a-entity id="spirit" scale="0 0 0" position="0 0 0">
        <!-- rotation y90 = 模型正面朝 +Z（釘在相機下時 +Z 正對玩家）；
             src 由 ar-game.js 依 data/muselings.json 的 ?spirit= 參數設定 -->
        <a-gltf-model id="spirit-model"
                      scale="0.78 0.78 0.78" position="0 0 0" rotation="0 90 0"
                      animation-mixer="clip: *smell*; crossFadeDuration: 0.25"></a-gltf-model>
        <!-- 隱形命中球：兒童手指點到狐狸附近就算，繞開 SkinnedMesh 射線檢測的不可靠 -->
        <a-sphere class="clickable" radius="0.5" position="0 0.35 0"
                  material="transparent: true; opacity: 0"></a-sphere>
      </a-entity>
    </a-entity>
  </a-scene>

  <script src="js/save.js?v=9"></script>
  <script src="js/ar-game.js?v=9"></script>
</body>
</html>
