<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>測試用 Marker｜時空裂縫</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
  <main class="landing">
    <h1>時空裂縫（測試 Marker）</h1>
    <p class="subtitle">手機保持直立顯示此頁，用另一台裝置的相機對準圖案</p>

    <div class="marker-frame">
      <img src="assets/targets/demo-marker-portrait.png"
           alt="MindAR 測試用追蹤圖案" class="marker-img">
    </div>

    <section class="note-card">
      <h2>說明</h2>
      <p>此為 MindAR 官方範例的追蹤圖（省去自行編譯 <code>.mind</code> 檔的步驟，先驗證可行性）。</p>
      <p>正式版請將館內設計的「裂縫圖騰」插畫，用 <a href="https://hiukim.github.io/mind-ar-js-doc/tools/compile" target="_blank" rel="noopener">MindAR 線上編譯器</a> 轉成 <code>.mind</code> 檔，替換 <code>ar.html</code> 中的 <code>imageTargetSrc</code> 即可。</p>
      <p>辨識訣竅：圖案保持平整、光線充足、佔畫面約 1/3 大小。</p>
    </section>

    <nav class="menu">
      <a class="btn" href="index.html">← 回首頁</a>
    </nav>
  </main>
</body>
</html>
