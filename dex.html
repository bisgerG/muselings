<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互動圖鑑｜時空守護者</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
  <main class="landing">
    <h1>互動圖鑑</h1>
    <p class="subtitle" id="dex-progress"></p>

    <div id="dex-list" class="dex-list"></div>

    <nav class="menu">
      <a class="btn btn-primary" href="ar.html">🔮 繼續任務</a>
      <a class="btn" href="index.html">← 回首頁</a>
      <button class="btn btn-danger" id="reset-btn">清除進度（測試用）</button>
    </nav>
  </main>

  <script src="js/save.js"></script>
  <script>
    // 圖鑑總表：正式版由 data/muselings.json 驅動，MVP 先內嵌
    const MUSELINGS = [
      { id: 'raptor_kid', name: '小快', species: '迅猛龍幼崽', zone: '恐龍廳', emoji: '🦖',
        facts: ['全身覆有羽毛（手臂骨骼有羽莖瘤痕跡）', '體型只有火雞大小', '肉食性'] },
      { id: 'mosasaur_baby', name: '？？？', species: '？？？', zone: '海洋廳', emoji: '🌊', facts: [], comingSoon: true }
    ];

    const save = MuselingSave.load();
    const listEl = document.getElementById('dex-list');
    let unlockedCount = 0;

    MUSELINGS.forEach(m => {
      const entry = save.dex[m.id];
      const unlocked = !!(entry && entry.unlocked);
      if (unlocked) unlockedCount++;

      const card = document.createElement('div');
      card.className = 'dex-card' + (unlocked ? '' : ' locked');
      if (unlocked) {
        card.innerHTML =
          '<div class="dex-emoji">' + m.emoji + '</div>' +
          '<h3>' + m.name + '</h3>' +
          '<p class="dex-species">' + m.species + '｜' + m.zone + '</p>' +
          '<p class="dex-hearts">羈絆：' + '❤️'.repeat(entry.affinity || 0) + '</p>' +
          '<ul>' + m.facts.map(f => '<li>' + f + '</li>').join('') + '</ul>' +
          '<p class="dex-date">收錄於 ' + new Date(entry.caughtAt).toLocaleString('zh-TW') + '</p>';
      } else {
        card.innerHTML =
          '<div class="dex-emoji">❓</div>' +
          '<h3>？？？</h3>' +
          '<p class="dex-species">' + m.zone + (m.comingSoon ? '（Phase 2 開放）' : '') + '</p>' +
          '<p class="dex-locked-hint">尚未喚醒這隻博物之靈</p>';
      }
      listEl.appendChild(card);
    });

    document.getElementById('dex-progress').textContent =
      '已喚醒 ' + unlockedCount + ' / ' + MUSELINGS.length + ' 隻博物之靈';

    // 兩段式清除，避免誤觸
    const resetBtn = document.getElementById('reset-btn');
    let armed = false;
    resetBtn.addEventListener('click', () => {
      if (!armed) {
        armed = true;
        resetBtn.textContent = '再點一次確認清除！';
        setTimeout(() => { armed = false; resetBtn.textContent = '清除進度（測試用）'; }, 3000);
      } else {
        MuselingSave.reset();
        location.reload();
      }
    });
  </script>
</body>
</html>
