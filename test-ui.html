<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掃描介面預覽（開發用）</title>
  <link rel="stylesheet" href="css/style.css?v=11">
  <style>
    body { background: #333; }
    .half { position: relative; height: 100vh; overflow: hidden; }
    /* 模擬相機畫面 */
    .fake-camera { position: absolute; inset: 0; background: linear-gradient(120deg, #6b6f62 0%, #8a8474 50%, #55584e 100%); }
    .half .loading-layer, .half .scan-layer { position: absolute; }
  </style>
</head>
<body class="ar-body">
  <!-- 上半：載入層 -->
  <div class="half">
    <div class="loading-layer">
      <div class="journal-book">
        <div class="book-half book-left"></div>
        <div class="book-half book-right"></div>
        <div class="book-page"></div>
      </div>
      <p class="loading-text">正在翻開你的奇遇日誌……</p>
    </div>
  </div>
  <!-- 下半：掃描層（疊在模擬相機畫面上） -->
  <div class="half">
    <div class="fake-camera"></div>
    <div class="scan-layer">
      <div class="vignette"></div>
      <div class="seeker">
        <div class="seeker-ring"></div>
        <span class="corner c-tl"></span><span class="corner c-tr"></span>
        <span class="corner c-bl"></span><span class="corner c-br"></span>
        <span class="spark spark-a">✨</span>
        <span class="spark spark-b">✨</span>
        <span class="spark spark-c">✨</span>
        <p class="seeker-text">尋找奇遇圖騰</p>
      </div>
    </div>
  </div>
</body>
</html>
